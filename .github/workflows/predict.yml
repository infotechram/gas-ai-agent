name: Gas Prediction

on:
  workflow_dispatch

jobs:

  predict:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v3

      - name: Run AI
        run: python ai_predict.py

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add result.txt
          git commit -m "Update prediction" || echo "No change"
          git push