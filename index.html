<!DOCTYPE html>
<html>

<h2>Gas Monitoring System</h2>

<input id="token" type="password" placeholder="Enter GitHub Token">

<br><br>

<input id="weight" type="number" placeholder="Enter Gas Weight">

<br><br>

<button onclick="saveReading()">Save Reading</button>

<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<script>

const owner="infotechram"
const repo="gas-ai-agent"

async function saveReading(){

let token=document.getElementById("token").value
let weight=document.getElementById("weight").value

const path="gas_readings.txt"

let file=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
headers:{Authorization:`Bearer ${token}`}
})

let data=await file.json()

let content=atob(data.content)

let today=new Date().toISOString().split("T")[0]

content+="\n"+today+","+weight

let updated=btoa(content)

await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
method:"PUT",
headers:{
Authorization:`Bearer ${token}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"Add gas reading",
content:updated,
sha:data.sha
})
})

alert("Reading saved")

}

async function predict(){

let token=document.getElementById("token").value

await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/predict.yml/dispatches`,{
method:"POST",
headers:{
Authorization:`Bearer ${token}`,
"Content-Type":"application/json"
},
body:JSON.stringify({ref:"main"})
})

document.getElementById("result").innerText="AI running..."

setTimeout(showResult,15000)

}
async function showResult(){

let token=document.getElementById("token").value

let response = await fetch(
`https://api.github.com/repos/${owner}/${repo}/contents/result.txt`,
{
headers:{
Authorization:`Bearer ${token}`,
Accept:"application/vnd.github+json"
}
})

let data = await response.json()

let decoded = atob(data.content.replace(/\n/g,""))

document.getElementById("result").innerText = decoded

}

</script>

</html>
