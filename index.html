<!DOCTYPE html>
<html>

<h2>Gas Monitoring System</h2>

<input id="weight" type="number" placeholder="Enter Gas Weight">

<br><br>

<button onclick="saveReading()">Save Reading</button>
<button onclick="predict()">Predict</button>

<p id="result"></p>

<script>

const owner="infotechram"
const repo="gas-ai-agent"

async function saveReading(){

let weight=document.getElementById("weight").value

await fetch(`https://api.github.com/repos/${owner}/${repo}/issues`,{

method:"POST",

headers:{
"Accept":"application/vnd.github+json"
},

body:JSON.stringify({
title:"gas-reading",
body:weight
})

})

alert("Reading submitted")

}

async function predict(){

await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/predict.yml/dispatches`,{
method:"POST",
headers:{
"Accept":"application/vnd.github+json"
},
body:JSON.stringify({ref:"main"})
})

setTimeout(showResult,5000)

}

async function showResult(){

let file=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/result.txt`)

let data=await file.json()

let result=atob(data.content)

document.getElementById("result").innerText=result

}

</script>

</html>
