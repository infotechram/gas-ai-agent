<!DOCTYPE html>
<html>

<h2>Gas Monitoring System</h2>

<input id="weight" type="number" placeholder="Enter Cylinder Weight">

<br><br>

<button onclick="saveReading()">Save Reading</button>

<button onclick="predict()">Predict Gas Usage</button>

<h3 id="prediction"></h3>

<script>

function saveReading(){

let weight=document.getElementById("weight").value

alert("Weight recorded: "+weight)

}

function predict(){

window.open(
"https://github.com/infotechram/gas-ai-agent/actions/workflows/predict.yml"
)

}

async function loadResult(){

try{

let response = await fetch("result.txt")

let text = await response.text()

document.getElementById("prediction").innerText = text

}catch(e){}

}

loadResult()

</script>

</html>
