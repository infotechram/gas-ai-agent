<!DOCTYPE html>
<html>

<h2>Enter Git Hub Token</h2>

<input id="token" type="text" placeholder="Enter token">

<h2>Enter Gas Cylinder Weight</h2>

<input id="weight" type="number" placeholder="Enter weight">

<button id="saveBtn" onclick="saveWeight()">Save</button>

<p id="msg"></p>

<script>

async function saveWeight() {
	const saveBtn = document.getElementById("saveBtn");
	saveBtn.disabled = true;
	document.getElementById("msg").innerText = "Saving...";
	let weight = document.getElementById("weight").value;
	let today = new Date().toISOString().slice(0, 10);
	let newEntry = today + " : " + weight + "\n";
	let token = document.getElementById("token").value;
	let repo = "infotechram/gas-ai-agent";
	let path = "gas_readings.txt";
	let url = "https://api.github.com/repos/" + repo + "/contents/" + path;

	async function trySave() {
		// Always fetch latest file and sha before saving
		let response = await fetch(url);
		if (!response.ok) {
			throw new Error("Failed to fetch file: " + response.status + " " + response.statusText);
		}
		let data = await response.json();
		let content = atob(data.content);
		content += newEntry;
		let updated = btoa(content);

		let putResponse = await fetch(url, {
			method: "PUT",
			headers: {
				"Authorization": "token " + token,
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				message: "New gas reading",
				content: updated,
				sha: data.sha
			})
		});
		return putResponse;
	}

	try {
		let putResponse = await trySave();
		if (!putResponse.ok) {
			let errorData = await putResponse.json();
			// If 409 Conflict, retry once with latest file/sha
			if (putResponse.status === 409) {
				document.getElementById("msg").innerText = "Conflict detected, retrying...";
				// On retry, re-fetch latest file and sha, append new entry, and try saving again
				putResponse = await trySave();
				if (!putResponse.ok) {
					errorData = await putResponse.json();
					throw new Error("Failed to save after retry: " + putResponse.status + " " + putResponse.statusText + "\n" + (errorData.message || ""));
				}
			} else {
				throw new Error("Failed to save: " + putResponse.status + " " + putResponse.statusText + "\n" + (errorData.message || ""));
			}
		}
		document.getElementById("msg").innerText = "Saved!";
	} catch (err) {
		document.getElementById("msg").innerText = "Error: " + err.message;
	} finally {
		saveBtn.disabled = false;
	}
}

</script>

</html>
